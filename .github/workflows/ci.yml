name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  order-service:
    name: order-service (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/order-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        run: mvn -B verify

  driver-service:
    name: driver-service (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/driver-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        run: mvn -B verify

  tracking-service:
    name: tracking-service (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/tracking-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/tracking-service/go.sum
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -count=1 ./...

  notification-service:
    name: notification-service (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci || npm install
      - name: Test
        run: npm test --if-present

  terraform:
    name: terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  kubernetes:
    name: kustomize build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
      - name: Build manifests
        run: |
          kustomize build infrastructure/kubernetes/data-plane > /tmp/data.yaml
          kustomize build infrastructure/kubernetes/services > /tmp/services.yaml
          echo "Data plane manifest lines: $(wc -l < /tmp/data.yaml)"
          echo "Services manifest lines:   $(wc -l < /tmp/services.yaml)"
