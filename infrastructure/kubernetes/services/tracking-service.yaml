apiVersion: v1
kind: Service
metadata:
  name: tracking-service
  namespace: fdt
spec:
  selector:
    app: tracking-service
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-service
  namespace: fdt
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tracking-service
  template:
    metadata:
      labels:
        app: tracking-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: tracking-service
          image: ghcr.io/your-org/fdt/tracking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: INGEST_BUFFER
              value: "16384"
            - name: INGEST_WORKERS
              value: "16"
            - name: KAFKA_TOPIC
              value: "driver.locations"
          envFrom:
            - configMapRef: { name: fdt-shared }
          resources:
            requests: { cpu: "300m", memory: "256Mi" }
            limits:   { cpu: "2",    memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tracking-service
  namespace: fdt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tracking-service
  minReplicas: 4
  maxReplicas: 40
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
