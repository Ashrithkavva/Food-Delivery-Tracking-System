# Redis — used for the order cache, driver geo-index, and pub/sub fan-out.
# In production, prefer AWS ElastiCache via Terraform.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: fdt
spec:
  ports:
    - port: 6379
      name: redis
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: fdt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "1Gi" }
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 3
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 10
