# Single-broker KRaft Kafka for development.
# Production uses Amazon MSK (provisioned via Terraform).
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: fdt
spec:
  ports:
    - port: 9092
      name: kafka
    - port: 9093
      name: controller
  clusterIP: None
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: fdt
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.8
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "0"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "controller,broker"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka:9093"
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_CFG_NUM_PARTITIONS
              value: "12"
            - name: KAFKA_CFG_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /bitnami/kafka
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
# Topic bootstrap job. Idempotent — re-runs are a no-op.
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-init
  namespace: fdt
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: bitnami/kafka:3.8
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for kafka..."
              until kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
                sleep 5
              done
              for t in orders.events driver.locations notifications.outbound; do
                kafka-topics.sh --bootstrap-server kafka:9092 \
                  --create --if-not-exists --topic "$t" \
                  --partitions 12 --replication-factor 1
              done
              kafka-topics.sh --bootstrap-server kafka:9092 --list
